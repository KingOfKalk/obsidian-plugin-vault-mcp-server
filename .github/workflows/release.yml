name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - uses: googleapis/release-please-action@v4
        id: release

      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}

      - name: Use Node.js 20
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: npm ci

      - name: Build
        if: ${{ steps.release.outputs.release_created }}
        run: npm run build

      - name: Create styles.css placeholder
        if: ${{ steps.release.outputs.release_created }}
        run: echo "/* obsidian-mcp-plugin styles */" > styles.css

      - name: Update versions.json
        if: ${{ steps.release.outputs.release_created }}
        run: |
          VERSION="${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}"
          MIN_APP_VERSION=$(node -p "require('./manifest.json').minAppVersion")
          node -e "
            const fs = require('fs');
            const versions = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
            versions['${VERSION}'] = '${MIN_APP_VERSION}';
            fs.writeFileSync('versions.json', JSON.stringify(versions, null, '\t') + '\n');
          "

      - name: Install screenshot system deps
        if: ${{ steps.release.outputs.release_created }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb x11-utils dbus dbus-x11 \
            libgtk-3-0 libnotify4 libnss3 libxss1 libasound2t64 \
            libsecret-1-0 xdg-utils libgbm1 libdrm2 libx11-xcb1 \
            libxcb-dri3-0 libxshmfence1

      - name: Install websocket-client
        if: ${{ steps.release.outputs.release_created }}
        run: pip install websocket-client

      - name: Download Obsidian AppImage
        if: ${{ steps.release.outputs.release_created }}
        run: |
          sudo mkdir -p /opt
          sudo wget -q \
            "https://github.com/obsidianmd/obsidian-releases/releases/download/v1.8.9/Obsidian-1.8.9.AppImage" \
            -O /opt/Obsidian.AppImage
          sudo chmod +x /opt/Obsidian.AppImage
          (cd /opt && sudo ./Obsidian.AppImage --appimage-extract >/dev/null)
          sudo ln -sf /opt/squashfs-root/obsidian /usr/local/bin/obsidian

      - name: Capture release screenshots
        if: ${{ steps.release.outputs.release_created }}
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset \
            >/tmp/xvfb.log 2>&1 &
          eval "$(dbus-launch --sh-syntax)"
          sleep 1
          xdpyinfo >/dev/null

          rm -rf /tmp/vault
          python3 docker/scripts/create_vault.py /tmp/vault \
            --plugin-dir "$(pwd)" --enable-plugin
          mkdir -p "$HOME/.config/obsidian"
          echo '{"vaults":{"v1":{"path":"/tmp/vault","ts":1,"open":true}}}' \
            > "$HOME/.config/obsidian/obsidian.json"

          nohup obsidian --no-sandbox --disable-gpu \
            --disable-software-rasterizer \
            --remote-debugging-port=9222 --remote-allow-origins='*' \
            "obsidian://open?path=/tmp/vault" \
            >/tmp/obsidian.log 2>&1 &
          sleep 5

          python3 docker/scripts/bootstrap.py \
            --vault /tmp/vault --port 9222 --no-launch

          mkdir -p /tmp/shots
          python3 docker/scripts/release_screenshots.py \
            --out-dir /tmp/shots --port 9222

      - name: Upload release assets
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ steps.release.outputs.tag_name }} \
            main.js \
            manifest.json \
            styles.css \
            versions.json \
            /tmp/shots/release-main.png \
            /tmp/shots/release-plugin-settings.png \
            /tmp/shots/release-server-running.png

      - name: Append Screenshots section to release notes
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release.outputs.tag_name }}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          {
            gh release view "$TAG" --json body -q .body
            echo
            echo "## Screenshots"
            echo
            echo "![Main view](${BASE}/release-main.png)"
            echo
            echo "![Plugin settings](${BASE}/release-plugin-settings.png)"
            echo
            echo "![Server running](${BASE}/release-server-running.png)"
          } > /tmp/release-notes.md
          gh release edit "$TAG" --notes-file /tmp/release-notes.md
