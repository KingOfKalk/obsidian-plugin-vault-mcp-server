name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - uses: googleapis/release-please-action@v5.0.0
        id: release

      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}

      - name: Use Node.js 20
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: npm ci

      - name: Build
        if: ${{ steps.release.outputs.release_created }}
        run: npm run build

      - name: Create styles.css placeholder
        if: ${{ steps.release.outputs.release_created }}
        run: echo "/* obsidian-mcp-plugin styles */" > styles.css

      - name: Update versions.json
        if: ${{ steps.release.outputs.release_created }}
        run: |
          VERSION="${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}"
          MIN_APP_VERSION=$(node -p "require('./manifest.json').minAppVersion")
          node -e "
            const fs = require('fs');
            const versions = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
            versions['${VERSION}'] = '${MIN_APP_VERSION}';
            fs.writeFileSync('versions.json', JSON.stringify(versions, null, '\t') + '\n');
          "

      - name: Build plugin zip
        if: ${{ steps.release.outputs.release_created }}
        env:
          PLUGIN_ID: obsidian-mcp
          VERSION: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}
        run: |
          mkdir -p "dist/${PLUGIN_ID}"
          cp main.js manifest.json styles.css "dist/${PLUGIN_ID}/"
          (cd dist && zip -r "../${PLUGIN_ID}-${VERSION}.zip" "${PLUGIN_ID}")

      - name: Upload plugin release assets
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}
        run: |
          gh release upload ${{ steps.release.outputs.tag_name }} \
            main.js \
            manifest.json \
            styles.css \
            versions.json \
            "obsidian-mcp-${VERSION}.zip"
