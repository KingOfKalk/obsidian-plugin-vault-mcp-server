name: E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'docker/**'
      - 'manifest.json'

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Ensure styles.css exists
        run: touch styles.css

      - name: Build Docker image
        run: docker compose -f docker/docker-compose.yml build visual-test

      - name: Run visual comparison
        run: docker compose -f docker/docker-compose.yml run --rm compare

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-screenshots
          path: |
            docker/screenshots/current/
            docker/screenshots/diff/
          retention-days: 30

      - name: Upload all screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-screenshots
          path: docker/screenshots/
          retention-days: 14
